<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>Ulises bounded browser fixture</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        background: #f4f4f2;
        color: #181816;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 32px));
        border: 1px solid #181816;
        background: #fff;
        padding: 24px;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        letter-spacing: 0;
      }

      p,
      pre {
        font-size: 14px;
        line-height: 1.5;
      }

      pre {
        min-height: 120px;
        padding: 12px;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
        background: #ecece8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ulises bounded browser fixture</h1>
      <p>
        The default mode is inert. Explicit test modes perform finite,
        same-origin browser-pressure attempts for defensive validation.
      </p>
      <pre id="status" aria-live="polite">fixture:idle</pre>
    </main>
    <script src="fixture.js"></script>
  </body>
</html>
